openapi: 3.0.1
info:
  title: Todo-Listen-Verwaltung
  description: ""
  contact:
    email: wichmann@bbs-os-brinkstr.de
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 0.1.0
 
servers:
  - url: http://127.0.0.1:5000/
 
tags:
  - name: Listenverwaltung
 
paths:
 
  /todo-list/{list_id}:
    get:
      tags:
        - Listenverwaltung
      summary: Get all items from list
      operationId: getList
      parameters:
        - name: list_id
          in: path
          description: list id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List items returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TodoEntry'
        '404':
          description: Invalid list id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
 
    delete:
      tags:
        - Listenverwaltung
      summary: Delete a list
      operationId: deleteList
      parameters:
        - name: list_id
          in: path
          description: list id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: List deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          description: Invalid list id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
 
  /todo-list:
    post:
      tags:
        - Listenverwaltung
      summary: Add new list
      operationId: addList
      requestBody:
        description: list object
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoListRequest'
      responses:
        '201':
          description: List added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoList'
        '406':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoList'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
 
  /todo-list/{list_id}:
    post:
      tags:
        - Listenverwaltung
      summary: Add entry to existing list
      operationId: addEntryToList
      parameters:
        - name: list_id
          in: path
          required: true
          description: list id
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoEntryRequest'
      responses:
        '201':
          description: Entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoEntry'
        '404':
          description: Invalid list id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
 
  /entry/{entry_id}:
    patch:
      tags:
        - Listenverwaltung
      summary: Update entry
      operationId: updateEntry
      parameters:
        - name: entry_id
          in: path
          required: true
          description: entry id
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoEntryRequestPartial'
      responses:
        '200':
          description: Entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoEntry'
        '404':
          description: Invalid entry id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '406':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoEntry'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
 
    delete:
      tags:
        - Listenverwaltung
      summary: Delete entry
      operationId: deleteEntry
      parameters:
        - name: entry_id
          in: path
          required: true
          description: entry id
          schema:
            type: string
      responses:
        '204':
          description: Entry deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          description: Invalid entry id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
 
components:
  schemas:
 
    TodoListRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name
 
    TodoList:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
 
    TodoEntryRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name
        - description
 
    TodoEntryRequestPartial:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
 
    TodoEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        user_id:
          type: string
          format: uuid
        list_id:
          type: string
          format: uuid
 
    ErrorMessage:
      type: object
      properties:
        message:
          type: string
 
    Message:
      type: object
      properties:
        message:
          type: string